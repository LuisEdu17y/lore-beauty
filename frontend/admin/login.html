<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Painel LORE</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <div class="pagina-admin">
    <div class="login-card">
      <div class="logo">LORE</div>
      <p>Painel administrativo</p>

      <div id="mensagem-erro-login" class="mensagem-api erro"></div>

      <form id="form-login">
        <div class="campo">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" name="usuario" required autocomplete="username">
        </div>
        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required autocomplete="current-password">
        </div>
        <button type="submit" class="botao botao-primario botao-bloco" id="botao-login">
          Entrar
        </button>
      </form>
    </div>
  </div>

  <script src="/js/admin-common.js"></script>
</body>
</html>
